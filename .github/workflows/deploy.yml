name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare frontend bundle
        run: |
          mkdir -p .deploy/frontend
          cp index.html .deploy/frontend/
          cp admin.html .deploy/frontend/
          cp login.html .deploy/frontend/
          cp main.css .deploy/frontend/
          cp admin.css .deploy/frontend/
          cp main.js .deploy/frontend/
          cp main-helpers.js .deploy/frontend/
          cp main-auth.js .deploy/frontend/
          cp main-commerce.js .deploy/frontend/
          cp main-product.js .deploy/frontend/
          cp admin.js .deploy/frontend/
          cp admin-api.js .deploy/frontend/
          cp login.js .deploy/frontend/

      - name: Publish static site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy .deploy/frontend
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
            --branch=main

  deploy-backend:
    name: Deploy Backend to Oracle Cloud
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy backend files to Oracle Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.ORACLE_PORT || '22' }}
          source: "server/**,scripts/deploy-backend.sh"
          target: ${{ secrets.ORACLE_APP_PATH }}
          strip_components: 0
          overwrite: true

      - name: Run remote backend deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.ORACLE_PORT || '22' }}
          script_stop: true
          script: |
            export APP_ROOT="${{ secrets.ORACLE_APP_PATH }}"
            export BACKEND_RESTART_COMMAND="${{ secrets.ORACLE_BACKEND_RESTART_COMMAND }}"
            export DATABASE_URL="${{ secrets.ORACLE_DATABASE_URL }}"
            export JWT_SECRET="${{ secrets.ORACLE_JWT_SECRET }}"
            export APP_BASE_URL="${{ secrets.ORACLE_APP_BASE_URL }}"
            export ENABLE_ADMIN_SETUP="${{ secrets.ORACLE_ENABLE_ADMIN_SETUP }}"
            export MAIL_HOST="${{ secrets.ORACLE_MAIL_HOST }}"
            export MAIL_PORT="${{ secrets.ORACLE_MAIL_PORT }}"
            export MAIL_USER="${{ secrets.ORACLE_MAIL_USER }}"
            export MAIL_PASS="${{ secrets.ORACLE_MAIL_PASS }}"
            export MAIL_FROM="${{ secrets.ORACLE_MAIL_FROM }}"
            bash "$APP_ROOT/scripts/deploy-backend.sh"
